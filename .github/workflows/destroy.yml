name: Destroy infraestrutura efêmera

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read    

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::715428148112:role/website-s3-iac-cv-github-actions-role
          aws-region: us-east-2        

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: efemero/terraform
        run: terraform init

      - name: Terraform Destroy
        working-directory: efemero/terraform
        run: terraform destroy -auto-approve

      - name: Remover state remoto
        run: |
          aws s3 rm s3://website-s3-iac-cv-tfstate/efemero/terraform.tfstate